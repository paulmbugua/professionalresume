buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35      // 💡 Use 35 if you're targeting SDK 35 as per your expo-build-properties
        targetSdkVersion = 34       // 🟡 Still okay to stay on 34 if Play Store allows
        ndkVersion = "25.2.9519653"
        kotlinVersion = "1.9.25"    // ✅ Match your gradle.properties
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.1.2")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:${kotlinVersion}")
        classpath("com.google.gms:google-services:4.4.1")
        // No need to add react.gradle or react-native-gradle-plugin manually here
    }
}

allprojects {
    repositories {
        def reactNativeDir = new File(rootDir, "../../../node_modules/react-native")
        def jscAndroidDir = new File(reactNativeDir, "../jsc-android/dist")

        maven { url reactNativeDir.toPath().resolve("android").toFile() }
        maven { url jscAndroidDir }

        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
}
