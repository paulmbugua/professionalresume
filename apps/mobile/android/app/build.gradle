apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react" // React Native plugin for RN 0.72+ setup
apply plugin: "com.google.gms.google-services"

def projectRoot = rootDir.getParentFile().getParentFile()

// React Native configuration block using react-native-gradle-plugin
react {
    entryFile = file("${projectRoot}/apps/mobile/src/index.tsx")
    reactNativeDir = file("${projectRoot}/node_modules/react-native")
    hermesCommand = file("$reactNativeDir/sdks/hermesc/%OS-BIN%/hermesc").absolutePath

    def resolveNodeModulePath = { modulePath ->
        return new File(["node", "--print", "require.resolve('${modulePath}')"]
            .execute(null, projectRoot)
            .text.trim()).getParentFile().getAbsoluteFile()
    }

    codegenDir = resolveNodeModulePath("@react-native/codegen/package.json")
    cliFile = resolveNodeModulePath("@expo/cli/package.json")
    bundleCommand = "export:embed"
    autolinkLibrariesWithApp() // Automatically links native libraries with the app
}

def enableProguardInReleaseBuilds = (findProperty('android.enableProguardInReleaseBuilds') ?: "false").toBoolean()
def jscFlavor = 'org.webkit:android-jsc:+' // Use JSC flavor for non-Hermes builds

android {
    namespace 'com.paulmbugua2.mytutorapp'
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId 'com.paulmbugua2.mytutorapp'
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"

        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a"
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            shrinkResources (findProperty('android.enableShrinkResourcesInReleaseBuilds')?.toBoolean() ?: false)
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            crunchPngs (findProperty('android.enablePngCrunchInReleaseBuilds')?.toBoolean() ?: true)
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging (findProperty('expo.useLegacyPackaging')?.toBoolean() ?: false)
        }
    }

    androidResources {
        ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:!CVS:!thumbs.db:!picasa.ini:!*~'
    }
}

// Load additional packaging options from gradle.properties
["pickFirsts", "excludes", "merges", "doNotStrip"].each { prop ->
    def options = (findProperty("android.packagingOptions.$prop") ?: "").split(",")
    options = options.collect { it.trim() }.findAll { it }
    if (options) {
        println "android.packagingOptions.$prop += $options (${options.size()})"
        options.each {
            android.packagingOptions[prop] += it
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android") // Ensure React Android is included for the app

    def isGifEnabled = (findProperty('expo.gif.enabled') ?: "") == "true"
    def isWebpEnabled = (findProperty('expo.webp.enabled') ?: "") == "true"
    def isWebpAnimatedEnabled = (findProperty('expo.webp.animated') ?: "") == "true"

    if (isGifEnabled) {
        implementation("com.facebook.fresco:animated-gif:${reactAndroidLibs.versions.fresco.get()}")
    }

    if (isWebpEnabled) {
        implementation("com.facebook.fresco:webpsupport:${reactAndroidLibs.versions.fresco.get()}")
        if (isWebpAnimatedEnabled) {
            implementation("com.facebook.fresco:animated-webp:${reactAndroidLibs.versions.fresco.get()}")
        }
    }

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android") // Hermes support if enabled
    } else {
        implementation jscFlavor // Use JSC if Hermes is disabled
    }
}
