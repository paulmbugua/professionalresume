pluginManagement { 
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}

rootProject.name = 'FunzaSasa'

// Monorepo-aware path resolution
def nodeExecutable = "${System.env.NODE_BINARY ?: 'node'}"

def resolveNodeModulePath = { pkg ->
    def output = [nodeExecutable, "--print", "require.resolve('${pkg}/package.json')"]
        .execute(null, rootDir)
        .text
        .trim()

    if (!output) {
        throw new GradleException("Could not resolve path for '${pkg}'")
    }

    return new File(output).getParentFile()
}

def reactNativeDir = resolveNodeModulePath("react-native")
def expoDir = resolveNodeModulePath("expo")

// Apply Expo autolinking
apply from: new File(expoDir, "scripts/autolinking.gradle")

include ':app'
