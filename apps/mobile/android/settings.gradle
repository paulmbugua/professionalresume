pluginManagement { 
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}

rootProject.name = 'FunzaSasa'

// Monorepo-aware path resolution
def reactNativeDir = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile()
def expoDir = new File(["node", "--print", "require.resolve('expo/package.json')"].execute(null, rootDir).text.trim()).getParentFile()



// Apply Expo autolinking
apply from: new File(expoDir, "scripts/autolinking.gradle")

include ':app'
