# apps/web/netlify.toml

[build]
  command = "yarn workspace @mytutorapp/web build"
  publish = "apps/web/dist"
  base    = "."

# 1) Proxy any /api/* request to your Railway backend:
[[redirects]]
  from     = "/api/*"
  to       = "https://api.funzasasa.co.ke"
  status   = 200
  force    = true

# 2) Then fallback everything else to index.html (SPA):
[[redirects]]
  from     = "/*"
  to       = "/index.html"
  status   = 200

[context.production.environment]
  # your code can still read VITE_BACKEND_URL if needed,
  # but in-browser fetch('/api/...') will be proxied
  VITE_BACKEND_URL = "https://funzasasa.co.ke/api"
