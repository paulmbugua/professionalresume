// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
    buildToolsVersion = '35.0.0'
    minSdkVersion = 24
    compileSdkVersion = 34 // Use SDK 34 (adjust if necessary)
    targetSdkVersion = 34  // Use SDK 34 (adjust if necessary)
    kotlinVersion = '1.7.20'
    ndkVersion = "26.1.10909125"
}

    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath('com.android.tools.build:gradle:7.4.2')  // Use a specific version of gradle
        classpath('com.facebook.react:react-native-gradle-plugin')
        classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
    }
}

allprojects {
    repositories {
        maven {
            url(new File(rootDir, "../node_modules/expo-modules-core/android/maven"))
        }
        maven {
            url(new File(rootDir, "../node_modules/expo-splash-screen/android/maven"))
        }
        maven {
            url(new File(rootDir, "../node_modules/expo-modules-react-native-host-wrapper/android/maven"))
        }
        google()
        mavenCentral()
    }
}


